<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言板 · PawAlliance</title>
  <style>
    /* ============================================================
       PawAlliance · 完整版式嵌入
       ============================================================ */
    :root {
      --cream: #FAF7F2; --cream-dark: #F0EAE0; --cream-border: #DDD0BB;
      --brown-light: #C8A97E; --brown-mid: #A07040; --brown-dark: #5C4A2A;
      --brown-deep: #3A2A10; --text-main: #3A2A10; --text-muted: #8A7050;
      --text-hint: #B0986A; --white: #FFFFFF; --radius-sm: 8px;
      --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
      --shadow-soft: 0 4px 24px rgba(90,60,20,0.08); --shadow-card: 0 2px 12px rgba(90,60,20,0.10);
      --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--cream); color: var(--text-main); line-height: 1.75; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250,247,242,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--cream-border); }
    .nav-inner { height: 62px; display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    .logo-text { font-size: 17px; font-weight: 600; color: var(--brown-dark); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { padding: 6px 14px; border-radius: 20px; font-size: 14px; color: var(--text-muted); text-decoration: none; }
    .nav-link.active { background: var(--cream-dark); color: var(--brown-dark); }
    .page-header { padding: 6rem 0 3rem; text-align: center; }
    .page-header h1 { font-size: 2rem; color: var(--brown-deep); }
    .message-wrap { max-width: 700px; margin: 0 auto; padding: 1rem 2rem; }
    .message-form { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--cream-border); padding: 2rem; margin-bottom: 2.5rem; box-shadow: var(--shadow-soft); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; background: var(--cream); border: 1px solid var(--cream-border); border-radius: var(--radius-sm); font-size: 14px; color: var(--text-main); outline: none; transition: border-color var(--transition); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--brown-light); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 28px; border-radius: 30px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: all var(--transition); }
    .btn-primary { background: var(--brown-light); color: var(--brown-deep); }
    .message-item { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--cream-border); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow-card); }
    .message-author { font-weight: 600; font-size: 14px; color: var(--brown-dark); }
    .message-time { font-size: 12px; color: var(--text-hint); margin-left: 8px; }
    .message-content { font-size: 14px; color: var(--text-muted); margin-top: 8px; line-height: 1.7; }
    .char-count { font-size: 12px; color: var(--text-hint); text-align: right; margin-top: 4px; }
    .footer { background: var(--cream-dark); border-top: 1px solid var(--cream-border); padding: 3rem 0; text-align: center; }
  </style>
</head>
<body>
  <nav class="navbar"><div class="nav-inner"><a href="index.html" class="logo"><span class="logo-text">PawAlliance</span></a><div class="nav-links"><a href="index.html" class="nav-link">首页</a><a href="message.html" class="nav-link active">留言板</a></div></div></nav>
  <div class="page-header"><h1>留言板</h1><p>留下你的想法，我们认真阅读每一条留言</p></div>
  <div class="message-wrap">
    <div class="message-form">
      <h3>发表留言</h3>
      <div class="form-group"><label>昵称</label><input type="text" id="msgName" placeholder="你的昵称" maxlength="20" /></div>
      <div class="form-group"><label>留言内容</label><textarea id="msgContent" rows="4" placeholder="写下你想说的话…" maxlength="300"></textarea><div class="char-count"><span id="charCount">0</span> / 300</div></div>
      <button class="btn btn-primary" onclick="submitMessage()">提交留言</button>
    </div>
    <div class="message-list" id="messageList"><p style="text-align:center;color:var(--text-hint);">加载中…</p></div>
  </div>
  <footer class="footer"><span class="logo-text">PawAlliance</span><p style="font-size:12px;color:var(--text-hint);margin-top:10px;">© 2026 以商养善，让爱延续</p></footer>

  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    // 字数统计逻辑
    const msgContent = document.getElementById("msgContent");
    const charCount = document.getElementById("charCount");
    msgContent.addEventListener("input", () => { charCount.textContent = msgContent.value.length; });

    async function loadMessages() {
      const el = document.getElementById("messageList");
      try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/messages?select=*&order=created_at.desc", {
          headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
        });
        const messages = await res.json();
        el.innerHTML = messages.map(msg => `
          <div class="message-item">
            <div class="message-author">${msg.name} <span class="message-time">${msg.created_at.slice(0,10)}</span></div>
            <div class="message-content">${msg.content}</div>
          </div>`).join("");
      } catch(e) { el.innerHTML = '<p style="text-align:center;">加载失败</p>'; }
    }

    async function submitMessage() {
      const name = document.getElementById("msgName").value.trim();
      const content = document.getElementById("msgContent").value.trim();
      if (!name || !content) return alert("请填写完整");
      await fetch(SUPABASE_URL + "/rest/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
        body: JSON.stringify({ name, content })
      });
      document.getElementById("msgName").value = "";
      document.getElementById("msgContent").value = "";
      loadMessages();
    }
    loadMessages();
  </script>
</body>
</html>
