<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · PawAlliance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">🐾 <span class="logo-text">PawAlliance</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="cats.html" class="nav-link">我们的猫</a>
                <a href="message.html" class="nav-link active">留言板</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1>猫友圈</h1>
        <p>分享你与毛孩子的故事</p>
    </div>

    <section class="section">
        <div class="container message-wrap">
            <div class="message-form">
                <h3>发表动态</h3>
                <div class="form-group">
                    <input type="text" id="userName" placeholder="你的昵称">
                </div>
                <div class="form-group">
                    <textarea id="msgContent" rows="3" placeholder="这一刻的想法..."></textarea>
                </div>
                <button onclick="postMessage()" class="btn btn-primary">发布</button>
            </div>

            <div id="momentsList" class="moments-container">
                <div class="empty-tip">正在加载动态...</div>
            </div>
        </div>
    </section>

    <script>
        const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

        // 1. 加载留言
        async function loadMessages() {
            const list = document.getElementById('momentsList');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const msgs = await response.json();

                if (!msgs || msgs.length === 0) {
                    list.innerHTML = '<div class="empty-tip">还没有动态，快来沙发！</div>';
                    return;
                }

                list.innerHTML = '';
                msgs.forEach(m => {
                    const date = new Date(m.created_at).toLocaleString();
                    const moment = document.createElement('div');
                    moment.className = 'moment-item';
                    moment.innerHTML = `
                        <div class="moment-avatar">👤</div>
                        <div class="moment-content">
                            <div class="moment-author">${m.nickname || '路人甲'}</div>
                            <div class="moment-text">${m.content}</div>
                            <div class="moment-footer">
                                <span>${date}</span>
                                <div class="moment-actions">评论</div>
                            </div>
                            ${m.reply ? `
                            <div class="moment-replies">
                                <div class="reply-item">
                                    <span class="reply-author">管理员回执：</span>
                                    <span>${m.reply}</span>
                                </div>
                            </div>` : ''}
                        </div>
                    `;
                    list.appendChild(moment);
                });
            } catch (e) {
                list.innerHTML = '<div class="empty-tip">加载失败</div>';
            }
        }

        // 2. 发布留言
        async function postMessage() {
            const name = document.getElementById('userName').value;
            const content = document.getElementById('msgContent').value;

            if (!name || !content) {
                alert("请填写完整信息~");
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
                    method: 'POST',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ nickname: name, content: content })
                });

                if (response.ok) {
                    document.getElementById('msgContent').value = '';
                    loadMessages(); // 刷新列表
                }
            } catch (e) {
                alert("发布失败，请检查数据库权限");
            }
        }

        document.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>
</html>
