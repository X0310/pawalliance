<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言板 · PawAlliance</title>
  <style>
    /* 这里是我直接从你 style.css 搬过来的完整版式 */
    :root {
      --cream: #FAF7F2; --cream-dark: #F0EAE0; --cream-border: #DDD0BB;
      --brown-light: #C8A97E; --brown-mid: #A07040; --brown-dark: #5C4A2A;
      --brown-deep: #3A2A10; --text-main: #3A2A10; --text-muted: #8A7050;
      --text-hint: #B0986A; --white: #FFFFFF; --radius-sm: 8px;
      --radius-md: 14px; --radius-lg: 20px; --transition: 0.25s ease;
    }
    body { font-family: "PingFang SC", sans-serif; background: var(--cream); color: var(--text-main); margin: 0; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250,247,242,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--cream-border); }
    .nav-inner { max-width: 1100px; margin: 0 auto; height: 62px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
    .logo-text { font-size: 17px; font-weight: 600; color: var(--brown-dark); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { padding: 6px 14px; border-radius: 20px; font-size: 14px; color: var(--text-muted); text-decoration: none; }
    .nav-link.active { background: var(--cream-dark); color: var(--brown-dark); }
    .page-header { padding: 6rem 0 3rem; text-align: center; }
    .message-wrap { max-width: 700px; margin: 0 auto; padding: 0 2rem; }
    .message-form { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--cream-border); padding: 2rem; margin-bottom: 2.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; background: var(--cream); border: 1px solid var(--cream-border); border-radius: var(--radius-sm); font-family: inherit; }
    .btn { padding: 11px 28px; border-radius: 30px; border: none; cursor: pointer; font-weight: 500; }
    .btn-primary { background: var(--brown-light); color: var(--brown-deep); }
    .message-item { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--cream-border); padding: 1.25rem; margin-bottom: 1rem; }
    .message-author { font-weight: 600; font-size: 14px; color: var(--brown-dark); }
    .message-time { font-size: 12px; color: var(--text-hint); margin-left: 8px; }
    .message-content { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
    
    /* 新增的回复样式 */
    .btn-reply { font-size: 12px; color: var(--brown-mid); cursor: pointer; float: right; padding: 2px 8px; background: var(--cream-dark); border-radius: 4px; }
    .reply-box { margin-top: 15px; padding: 12px; background: var(--cream-dark); border-radius: var(--radius-sm); border-left: 3px solid var(--brown-light); }
    .reply-item { font-size: 13px; margin-bottom: 5px; }
    .char-count { font-size: 12px; color: var(--text-hint); text-align: right; }
    .footer { background: var(--cream-dark); padding: 3rem 0; text-align: center; border-top: 1px solid var(--cream-border); }
  </style>
</head>
<body>
  <nav class="navbar"><div class="nav-inner"><span class="logo-text">🐾 PawAlliance</span><div class="nav-links"><a href="index.html" class="nav-link">首页</a><a href="message.html" class="nav-link active">留言板</a></div></div></nav>
  <div class="page-header"><h1>留言板</h1><p>留下你的想法，我们认真阅读每一条留言</p></div>
  <div class="message-wrap">
    <div class="message-form" id="inputArea">
      <h3 id="formTitle">发表留言</h3>
      <div class="form-group"><label>昵称</label><input type="text" id="msgName" maxlength="20"></div>
      <div class="form-group"><label>内容</label><textarea id="msgContent" rows="4" maxlength="300"></textarea><div class="char-count"><span id="charCount">0</span>/300</div></div>
      <button class="btn btn-primary" onclick="submitMessage()">提交留言</button>
      <button id="cancelReply" onclick="resetForm()" style="display:none; border:none; background:none; cursor:pointer; margin-left:10px;">取消</button>
    </div>
    <div id="messageList"></div>
  </div>
  <footer class="footer"><span class="logo-text">PawAlliance</span><p>© 2026 以商养善，让爱延续</p></footer>

  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";
    let replyingToId = null;

    // 字数统计
    document.getElementById("msgContent").oninput = function() {
      document.getElementById("charCount").innerText = this.value.length;
    };

    function startReply(id, name) {
      replyingToId = id;
      document.getElementById('formTitle').innerText = "回复 @" + name;
      document.getElementById('cancelReply').style.display = "inline";
      document.getElementById('inputArea').scrollIntoView();
    }

    function resetForm() {
      replyingToId = null;
      document.getElementById('formTitle').innerText = "发表留言";
      document.getElementById('cancelReply').style.display = "none";
      document.getElementById('msgContent').value = "";
    }

    async function loadMessages() {
      const res = await fetch(SUPABASE_URL + "/rest/v1/messages?select=*&order=created_at.desc", {
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
      });
      const data = await res.json();
      const main = data.filter(m => !m.parent_id);
      const replies = data.filter(m => m.parent_id);
      
      document.getElementById("messageList").innerHTML = main.map(msg => {
        const sub = replies.filter(r => r.parent_id === msg.id);
        return `<div class="message-item">
          <span class="btn-reply" onclick="startReply('${msg.id}', '${msg.name}')">回复</span>
          <div class="message-author">${msg.name} <span class="message-time">${msg.created_at.slice(0,10)}</span></div>
          <div class="message-content">${msg.content}</div>
          ${sub.length > 0 ? `<div class="reply-box">${sub.map(r => `<div class="reply-item"><b>${r.name}</b>: ${r.content}</div>`).join('')}</div>` : ''}
        </div>`;
      }).join('');
    }

    async function submitMessage() {
      const name = document.getElementById("msgName").value;
      const content = document.getElementById("msgContent").value;
      await fetch(SUPABASE_URL + "/rest/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
        body: JSON.stringify({ name, content, parent_id: replyingToId })
      });
      resetForm();
      loadMessages();
    }
    loadMessages();
  </script>
</body>
</html>
