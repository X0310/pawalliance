<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>留言板 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .char-count { font-size: 12px; color: var(--text-hint); text-align: right; margin-top: 4px; }
    .loading { text-align: center; color: var(--text-hint); padding: 2rem; font-size: 14px; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-fallback" style="display:flex">🐾</div>
        <span class="logo-text">PawAlliance</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">首页</a>
        <a href="cats.html" class="nav-link">我们的猫</a>
        <a href="adopt.html" class="nav-link">云养计划</a>
        <a href="news.html" class="nav-link">动态公告</a>
        <a href="message.html" class="nav-link active">留言板</a>
        <a href="about.html" class="nav-link">关于我们</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h1>留言板</h1>
    <p>留下你的想法，我们认真阅读每一条留言</p>
  </div>

  <section class="section" style="padding-top: 1rem;">
    <div class="container">
      <div class="message-wrap">
        <div class="message-form" id="inputArea">
          <h3 id="formTitle">发表留言</h3>
          <div class="form-group">
            <label>昵称</label>
            <input type="text" id="msgName" placeholder="你的昵称" maxlength="20" />
          </div>
          <div class="form-group">
            <label>留言内容</label>
            <textarea id="msgContent" rows="4" placeholder="写下你想说的话…" maxlength="300"></textarea>
            <div class="char-count"><span id="charCount">0</span> / 300</div>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn btn-primary" onclick="submitMessage()">提交留言</button>
            <button id="cancelReply" onclick="resetForm()" style="display:none; border:none; background:none; color:var(--text-hint); cursor:pointer; font-size:14px;">取消回复</button>
          </div>
        </div>

        <div class="message-list" id="messageList">
          <p class="loading">加载中…</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo-text">PawAlliance</span>
      <p class="footer-copy">© 2026 PawAlliance · 以商养善，让爱延续</p>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    let replyingToId = null; 

    // 字数统计逻辑
    const msgInput = document.getElementById("msgContent");
    const charShow = document.getElementById("charCount");
    msgInput.addEventListener("input", () => { charShow.textContent = msgInput.value.length; });

    function resetForm() {
      replyingToId = null;
      document.getElementById('formTitle').innerText = "发表留言";
      document.getElementById('cancelReply').style.display = "none";
      document.getElementById('msgContent').value = "";
      charShow.textContent = "0";
    }

    function startReply(id, name) {
      replyingToId = id;
      document.getElementById('formTitle').innerText = `回复 @${name}`;
      document.getElementById('cancelReply').style.display = "inline-block";
      document.getElementById('inputArea').scrollIntoView({ behavior: 'smooth' });
    }

    async function loadMessages() {
      const el = document.getElementById("messageList");
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.desc`, {
          headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
        });
        const all = await res.json();
        
        // 区分主留言和子回复
        const main = all.filter(m => !m.parent_id);
        const replies = all.filter(m => m.parent_id);

        if (main.length === 0) {
          el.innerHTML = '<p class="empty-tip" style="text-align:center; padding:2rem; color:var(--text-hint);">还没有留言，来抢沙发吧～</p>';
          return;
        }

        el.innerHTML = main.map(msg => {
          const sub = replies.filter(r => r.parent_id === msg.id);
          return `
            <div class="message-item">
                <div class="message-header">
                    <span class="message-author">${escapeHtml(msg.name || msg.nickname)}</span>
                    <span class="message-time">${msg.created_at.slice(0,10)}</span>
                </div>
                <div class="message-content">${escapeHtml(msg.content)}</div>
                <div class="message-actions">
                    <span class="btn-reply" onclick="startReply('${msg.id}', '${escapeHtml(msg.name || msg.nickname)}')">回复</span>
                </div>
                ${sub.length > 0 ? `
                <div class="reply-box">
                    ${sub.map(r => `<div class="reply-item"><span class="reply-name">${escapeHtml(r.name || r.nickname)}</span>：${escapeHtml(r.content)}</div>`).join('')}
                </div>` : ''}
            </div>`;
        }).join("");
      } catch(e) { el.innerHTML = '<p class="loading">加载失败，请刷新页面 😿</p>'; }
    }

    async function submitMessage() {
      const name = document.getElementById("msgName").value.trim();
      const content = document.getElementById("msgContent").value.trim();
      if (!name || !content) return alert("请填写名字和留言内容");

      const btn = document.querySelector(".btn-primary");
      btn.textContent = "提交中...";
      btn.disabled = true;

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
          body: JSON.stringify({ 
            name: name, 
            nickname: name, // 兼容你之前可能用的不同字段名
            content: content, 
            parent_id: replyingToId 
          })
        });
        resetForm();
        loadMessages();
      } catch(e) { alert("提交失败，请重试"); }
      finally { btn.textContent = "提交留言"; btn.disabled = false; }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    loadMessages();
  </script>
</body>
</html>
