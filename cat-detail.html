<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猫咪详情 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">🐾 <span class="logo-text">PawAlliance</span></a>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div id="catDetailCard" class="cat-detail-card" style="background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <div style="text-align: center; padding: 100px 0;">加载中...</div>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    async function fetchDetail() {
      const params = new URLSearchParams(window.location.search);
      const catId = params.get('id');
      const card = document.getElementById('catDetailCard');

      if (!catId) {
        card.innerHTML = '<div style="padding:50px; text-align:center;">未找到猫咪 ID</div>';
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/cats?id=eq.${catId}&select=*`, {
          headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
        const data = await response.json();
        
        if (!data || data.length === 0) {
          card.innerHTML = '<div style="padding:50px; text-align:center;">猫咪不存在</div>';
          return;
        }

        const cat = data[0];
        // 渲染详细信息（字段名匹配你的数据库：cat.name）
        card.innerHTML = `
          <div style="display: flex; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
              <img src="${cat.photo_url || 'assets/cats/yitong.png'}" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="flex: 1; min-width: 300px; padding: 40px;">
              <h1 style="color: #5C4A2A; margin-bottom: 10px;">${cat.name}</h1>
              <p style="background: #FFF4E6; display: inline-block; padding: 4px 12px; border-radius: 4px; color: #FF9D00; font-weight: bold; margin-bottom: 20px;">${cat.status || '在册'}</p>
              
              <div style="margin-bottom: 30px; line-height: 1.8; color: #666;">
                <p><strong>年龄：</strong>${cat.年龄 || '未知'}</p>
                <p><strong>性别：</strong>${cat.性别 || '未知'}</p>
                <p><strong>毛色：</strong>${cat.毛色 || '未知'}</p>
                <p><strong>性格：</strong>${cat.性格 || '暂无描述'}</p>
                <p><strong>发现地点：</strong>${cat.发现地点 || '暂无记录'}</p>
              </div>

              <div style="border-top: 1px solid #eee; pt: 20px;">
                <h3 style="margin-bottom: 10px; color: #5C4A2A;">领养/救助故事</h3>
                <p style="color: #888; line-height: 1.6;">${cat.故事 || '这只小猫的故事正在整理中...'}</p>
              </div>

              <div style="margin-top: 40px;">
                <a href="adopt.html" style="background: #FF9D00; color: #fff; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: bold;">立即咨询领养</a>
                <a href="cats.html" style="margin-left: 15px; color: #999; text-decoration: none;">返回列表</a>
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        card.innerHTML = '<div style="padding:50px; text-align:center;">详情加载失败</div>';
      }
    }
    fetchDetail();
  </script>
</body>
</html>
