  <meta charset="UTF-8" />

</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-fallback" style="display:flex">🐾</div>
        <span class="logo-text">PawAlliance</span>

      <div class="nav-links" id="navLinks">

        <a href="cats.html" class="nav-link active">我们的猫</a>
        <a href="adopt.html" class="nav-link">云养计划</a>

  <div class="page-header">
    <h1>认识我们的猫</h1>
    <p>每一只都有自己的故事，等待被你看见</p>
  </div>

  <section class="section" style="padding-top: 1rem;">
    <div class="container">
      <div class="cats-grid" id="catsContainer">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #5C4A2A;">
            正在召唤小猫咪们...
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo-text">PawAlliance</span>
      <p class="footer-copy">© 2026 PawAlliance · 以商养善，让爱延续</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    async function loadCatsFromSupabase() {
        const container = document.getElementById('catsContainer');
        if (!container) return;

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/cats?select=*&order=created_at.desc`, {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                }
            });

            const cats = await response.json();

            // 调试用：如果还是没显示，请按 F12 看看 Console 里打印出来的到底是什么
            console.log("数据库返回的原始数据:", cats);

            if (!cats || cats.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">数据库里没有数据。</div>';
                return;
            }

            container.innerHTML = ''; 
            cats.forEach(cat => {
                // 【双保险逻辑】：优先找 name，找不到找 NAME，再找不到找 昵称
                const catName = cat.name || cat.NAME || cat.昵称 || "无名小猫";
                const catPhoto = cat.photo_url || cat.PHOTO_URL || 'assets/cats/yitong.png';
                const catStatus = cat.status || cat.STATUS || '在册';
                const catInfo = cat.性格 || cat.character || '暂无描述';

                const card = document.createElement('div');
                card.className = 'cat-card';
                card.innerHTML = `
                    <div class="cat-image">
                        <img src="${catPhoto}" alt="${catName}" onerror="this.src='assets/cats/yitong.png'">
                        <span class="cat-status">${catStatus}</span>
                    </div>
                    <div class="cat-info">
                        <h3>${catName}</h3>
                        <p>${catInfo}</p>
                        <a href="cat-detail.html?id=${cat.id}" class="btn-sm">了解更多</a>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("加载出错:", error);
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: red; padding: 50px;">加载出错，请检查配置。</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', loadCatsFromSupabase);
  </script>
</body>
</html>
