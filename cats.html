<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的猫 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-fallback" style="display:flex">🐾</div>
        <span class="logo-text">PawAlliance</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">首页</a>
        <a href="cats.html" class="nav-link active">我们的猫</a>
        <a href="adopt.html" class="nav-link">云养计划</a>
        <a href="news.html" class="nav-link">动态公告</a>
        <a href="message.html" class="nav-link">留言板</a>
        <a href="about.html" class="nav-link">关于我们</a>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <h1>认识我们的猫</h1>
    <p>每一只都有自己的故事，等待被你看见</p>
  </div>

  <section class="section" style="padding-top: 1rem;">
    <div class="container">
      <div class="cats-grid" id="catsContainer">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #5C4A2A;">
            正在召唤小猫咪们...
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo-text">PawAlliance</span>
      <p class="footer-copy">© 2026 PawAlliance · 以商养善，让爱延续</p>
    </div>
  </footer>

  <script src="main.js"></script>

  <script>
    // 1. Supabase 配置
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    async function loadCatsFromSupabase() {
        const container = document.getElementById('catsContainer');
        if (!container) return;

        try {
            // 2. 发起数据库查询
            const response = await fetch(`${SUPABASE_URL}/rest/v1/cats?select=*&order=created_at.desc`, {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP 错误! 状态码: ${response.status}`);
            }

            const cats = await response.json();

            // 3. 检查是否有数据
            if (!cats || cats.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                        <p style="font-size: 1.2rem; color: #5C4A2A;">😿 数据库里还没有猫咪记录</p>
                        <p style="color: #999; margin-top: 10px;">请去管理后台添加猫咪数据</p>
                    </div>`;
                return;
            }

            // 4. 清空容器并循环渲染
            container.innerHTML = ''; 
            cats.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                
                // 注意：如果你的数据库列名是中文，这里就用 cat.昵称；如果是英文，就改用 cat.name
                card.innerHTML = `
                    <div class="cat-image">
                        <img src="${cat.photo_url || 'assets/cats/yitong.png'}" 
                             alt="${cat.昵称 || '小猫'}" 
                             onerror="this.src='assets/cats/yitong.png'">
                        <span class="cat-status">${cat.status || '在册'}</span>
                    </div>
                    <div class="cat-info">
                        <h3>${cat.昵称 || '未命名'}</h3>
                        <p>${cat.性格 || '暂无性格描述'}</p>
                        <a href="cat-detail.html?id=${cat.id}" class="btn-sm">了解更多</a>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error('加载失败:', error);
            container.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; color: red; padding: 50px;">
                    <h3>⚠️ 加载失败</h3>
                    <p>${error.message}</p>
                    <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">请检查浏览器控制台 (F12) 获取详细信息</p>
                </div>`;
        }
    }

    // 页面加载完成后立即启动
    document.onreadystatechange = function () {
        if (document.readyState === "complete") {
            loadCatsFromSupabase();
        }
    };
  </script>
</body>
</html>
