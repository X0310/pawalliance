<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的猫 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-fallback" style="display:flex">🐾</div>
        <span class="logo-text">PawAlliance</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">首页</a>
        <a href="cats.html" class="nav-link active">我们的猫</a>
        <a href="adopt.html" class="nav-link">云养计划</a>
        <a href="news.html" class="nav-link">动态公告</a>
        <a href="message.html" class="nav-link">留言板</a>
        <a href="about.html" class="nav-link">关于我们</a>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <h1>认识我们的猫</h1>
    <p>每一只都有自己的故事，等待被你看见</p>
  </div>

  <section class="section" style="padding-top: 1rem;">
    <div class="container">
      <div class="cats-grid" id="allCats">
        <p class="empty-tip">加载中…</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo-text">PawAlliance</span>
      <p class="footer-copy">© 2026 PawAlliance · 以商养善，让爱延续</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    async function loadCats() {
      const el = document.getElementById("allCats");
      try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/cats?select=*&order=created_at.desc", {
          headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
        });
        const cats = await res.json();

        if (!cats || cats.length === 0) {
          el.innerHTML = '<p class="empty-tip">暂无猫咪档案～</p>';
          return;
        }

        el.innerHTML = cats.map(function(cat) {
          const statusColor = { "在册": "status-green", "已送养": "status-blue", "医疗中": "status-amber" }[cat.status] || "status-gray";
          const photoHTML = cat.photo_url
            ? '<img src="' + cat.photo_url + '" alt="' + (cat.昵称||"") + '" class="cat-card-img" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" /><div class="cat-card-emoji" style="display:none">🐱</div>'
            : '<div class="cat-card-emoji">🐱</div>';
          return '<div class="cat-card">' +
            '<div class="cat-card-photo">' + photoHTML +
            '<span class="cat-status ' + statusColor + '">' + (cat.status || "在册") + '</span></div>' +
            '<div class="cat-card-info">' +
            '<div class="cat-card-header"><h3 class="cat-card-name">' + (cat.昵称 || "未命名") + '</h3></div>' +
            '<p class="cat-card-desc">' + (cat.性格 || "这只猫咪很神秘～") + '</p>' +
            '<a href="cat-detail.html?id=' + cat.id + '" class="btn btn-outline btn-sm">查看详情</a>' +
            '</div></div>';
        }).join("");

        // 添加"期待下一位"占位卡
        el.innerHTML += '<div class="cat-card cat-card-placeholder">' +
          '<div class="cat-card-photo"><div class="cat-card-emoji">🐾</div>' +
          '<span class="cat-status status-gray">敬请期待</span></div>' +
          '<div class="cat-card-info"><h3 class="cat-card-name">期待下一位</h3>' +
          '<p class="cat-card-desc">我们正在等待下一位有缘的小生命……</p></div></div>';

      } catch(e) {
        el.innerHTML = '<p class="empty-tip">加载失败，请刷新重试 😿</p>';
      }
    }

    loadCats();
  </script>
</body>
</html>
