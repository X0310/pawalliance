<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--cream); }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-box { background:var(--white); border-radius:var(--radius-xl); border:1px solid var(--cream-border); padding:3rem; width:360px; box-shadow:var(--shadow-soft); }
    .login-box h2 { font-size:20px; font-weight:500; color:var(--brown-dark); margin-bottom:.5rem; }
    .login-box p { font-size:13px; color:var(--text-hint); margin-bottom:2rem; }
    .login-box .form-group { margin-bottom:1rem; }
    .login-box label { display:block; font-size:13px; color:var(--text-muted); margin-bottom:5px; }
    .login-box input { width:100%; padding:10px 14px; background:var(--cream); border:1px solid var(--cream-border); border-radius:var(--radius-sm); font-size:14px; color:var(--text-main); outline:none; }
    .login-box input:focus { border-color:var(--brown-light); }
    .login-error { color:#c0392b; font-size:13px; margin-top:8px; display:none; }

    .admin-wrap { max-width:1000px; margin:0 auto; padding:0 2rem 4rem; }
    .admin-header { display:flex; align-items:center; justify-content:space-between; padding:1.5rem 0; border-bottom:1px solid var(--cream-border); margin-bottom:2rem; }
    .admin-title { font-size:20px; font-weight:500; color:var(--brown-dark); }
    .tab-bar { display:flex; gap:8px; margin-bottom:2rem; }
    .tab-btn { padding:8px 20px; border-radius:20px; font-size:14px; border:1px solid var(--cream-border); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .2s; }
    .tab-btn.active { background:var(--brown-light); color:var(--brown-deep); border-color:var(--brown-light); }

    /* 表格 */
    .table-wrap { overflow-x:auto; }
    .data-table { width:100%; border-collapse:collapse; font-size:14px; }
    .data-table th { text-align:left; padding:10px 12px; background:var(--cream-dark); color:var(--text-muted); font-weight:500; font-size:13px; border-bottom:1px solid var(--cream-border); }
    .data-table td { padding:12px; border-bottom:1px solid var(--cream-border); color:var(--text-main); vertical-align:top; }
    .data-table tr:hover td { background:var(--cream); }
    .action-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-edit { background:var(--cream-dark); color:var(--brown-mid); border:1px solid var(--cream-border); padding:5px 12px; border-radius:10px; font-size:12px; cursor:pointer; transition:all .2s; }
    .btn-edit:hover { background:var(--cream-border); }
    .btn-del { background:#fde8e8; color:#c0392b; border:1px solid #f5c6c6; padding:5px 12px; border-radius:10px; font-size:12px; cursor:pointer; transition:all .2s; }
    .btn-del:hover { background:#f5c6c6; }

    /* 弹窗 */
    .modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(50,30,10,.4); align-items:flex-start; justify-content:center; padding:2rem; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--white); border-radius:var(--radius-xl); padding:2rem; width:100%; max-width:640px; box-shadow:var(--shadow-soft); margin:auto; }
    .modal-box h3 { font-size:18px; font-weight:500; color:var(--brown-dark); margin-bottom:1.5rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid .full { grid-column:1/-1; }
    .form-group label { display:block; font-size:13px; color:var(--text-muted); margin-bottom:5px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:9px 12px; background:var(--cream); border:1px solid var(--cream-border); border-radius:var(--radius-sm); font-size:14px; color:var(--text-main); font-family:inherit; resize:vertical; outline:none; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--brown-light); }
    .modal-footer { display:flex; gap:12px; justify-content:flex-end; margin-top:1.5rem; }

    /* 留言管理 */
    .msg-card { background:var(--white); border:1px solid var(--cream-border); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:1rem; }
    .msg-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .msg-author { font-weight:500; font-size:14px; color:var(--brown-dark); }
    .msg-time { font-size:12px; color:var(--text-hint); margin-left:8px; }
    .msg-content { font-size:14px; color:var(--text-muted); margin-bottom:10px; line-height:1.7; }
    .msg-likes { font-size:12px; color:var(--text-hint); margin-bottom:10px; }
    .reply-area { display:flex; gap:8px; margin-top:8px; }
    .reply-area input { flex:1; padding:8px 12px; background:var(--cream); border:1px solid var(--cream-border); border-radius:var(--radius-sm); font-size:13px; outline:none; }
    .reply-area input:focus { border-color:var(--brown-light); }
    .existing-reply { background:var(--cream-dark); border-radius:var(--radius-sm); border-left:3px solid var(--brown-light); padding:10px 14px; margin-top:8px; }
    .existing-reply-label { font-size:12px; color:var(--brown-mid); margin-bottom:4px; }
    .existing-reply-content { font-size:13px; color:var(--text-muted); }

    /* 回复子列表 */
    .replies-section { margin-top:12px; padding-top:12px; border-top:1px solid var(--cream-border); }
    .replies-section-title { font-size:13px; color:var(--text-muted); margin-bottom:8px; font-weight:500; }
    .reply-manage-item { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:8px 10px; background:var(--cream); border-radius:var(--radius-sm); margin-bottom:6px; }
    .reply-manage-content { flex:1; }
    .reply-manage-name { font-size:13px; font-weight:500; color:var(--brown-dark); }
    .reply-manage-text { font-size:13px; color:var(--text-muted); margin-top:3px; }
    .reply-manage-meta { font-size:11px; color:var(--text-hint); margin-top:3px; }

    /* Toast */
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--brown-dark); color:#fff; padding:12px 28px; border-radius:30px; font-size:14px; opacity:0; transition:all .3s; z-index:999; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .section-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
    .empty-tip { color:var(--text-hint); font-size:14px; text-align:center; padding:3rem 0; }
    .loading { text-align:center; color:var(--text-hint); padding:2rem; font-size:14px; }
    .status-badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:12px; }
    .s-在册 { background:#D4E8C2; color:#3A6020; }
    .s-已送养 { background:#C2D8E8; color:#204060; }
    .s-医疗中 { background:#F5DCA0; color:#7A5010; }
  </style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>🐾 PawAlliance 管理后台</h2>
    <p>请输入管理员密码登录</p>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="passwordInput" placeholder="输入密码" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:.5rem" onclick="login()">登录</button>
    <p class="login-error" id="loginError">密码错误，请重试</p>
  </div>
</div>

<!-- 管理页面 -->
<div id="adminPage" style="display:none;padding-top:2rem">
  <div class="admin-wrap">
    <div class="admin-header">
      <span class="admin-title">🐾 PawAlliance 管理后台</span>
      <div style="display:flex;gap:12px;align-items:center">
        <a href="index.html" class="btn btn-outline btn-sm">返回网站</a>
        <button class="btn btn-outline btn-sm" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('cats',this)">猫咪档案</button>
      <button class="tab-btn" onclick="switchTab('messages',this)">留言管理</button>
    </div>

    <!-- 猫咪 Tab -->
    <div id="tab-cats">
      <div class="section-top">
        <span style="font-size:15px;color:var(--text-muted)" id="catsCount">加载中…</span>
        <button class="btn btn-primary btn-sm" onclick="openCatModal()">+ 新增猫咪</button>
      </div>
      <div class="table-wrap">
        <div id="catsList"><p class="loading">加载中…</p></div>
      </div>
    </div>

    <!-- 留言 Tab -->
    <div id="tab-messages" style="display:none">
      <div class="section-top">
        <span style="font-size:15px;color:var(--text-muted)" id="msgCount">加载中…</span>
      </div>
      <div id="msgList"><p class="loading">加载中…</p></div>
    </div>
  </div>
</div>

<!-- 猫咪编辑弹窗 -->
<div class="modal-overlay" id="catModal">
  <div class="modal-box">
    <h3 id="modalTitle">新增猫咪</h3>
    <input type="hidden" id="editCatId" />
    <div class="form-grid">
      <div class="form-group"><label>档案编号</label><input type="text" id="f_档案编号" placeholder="如 LM-2026-002" /></div>
      <div class="form-group"><label>昵称 *</label><input type="text" id="f_昵称" placeholder="猫咪名字" /></div>
      <div class="form-group"><label>物种</label><select id="f_物种"><option>猫</option><option>狗</option></select></div>
      <div class="form-group"><label>性别</label><select id="f_性别"><option>未知</option><option>公</option><option>母</option></select></div>
      <div class="form-group"><label>年龄</label><input type="text" id="f_年龄" placeholder="如 约1岁" /></div>
      <div class="form-group"><label>毛色</label><input type="text" id="f_毛色" placeholder="如 橘白色" /></div>
      <div class="form-group"><label>体型</label><select id="f_体型"><option>小型</option><option>中型</option><option>大型</option></select></div>
      <div class="form-group"><label>当前状态</label><select id="f_status"><option value="在册">在册</option><option value="已送养">已送养</option><option value="医疗中">医疗中</option></select></div>
      <div class="form-group"><label>发现时间</label><input type="text" id="f_发现时间" placeholder="如 2026-01" /></div>
      <div class="form-group"><label>发现地点</label><input type="text" id="f_发现地点" /></div>
      <div class="form-group full"><label>性格特点</label><input type="text" id="f_性格" placeholder="如 温顺、活泼" /></div>
      <div class="form-group full"><label>特殊习性</label><input type="text" id="f_特殊习性" /></div>
      <div class="form-group"><label>健康状况</label><select id="f_健康状况总结"><option>健康</option><option>轻微伤病</option><option>重病</option><option>残疾</option></select></div>
      <div class="form-group"><label>绝育情况</label><select id="f_绝育信息"><option>未知</option><option>已绝育</option><option>未绝育</option></select></div>
      <div class="form-group full"><label>疫苗记录</label><input type="text" id="f_疫苗记录" /></div>
      <div class="form-group full"><label>驱虫记录</label><input type="text" id="f_驱虫记录" /></div>
      <div class="form-group full"><label>伤病记录</label><textarea id="f_伤病记录" rows="2"></textarea></div>
      <div class="form-group full"><label>救助过程记录</label><textarea id="f_救助过程记录" rows="3"></textarea></div>
      <div class="form-group full"><label>领养信息</label><textarea id="f_领养信息" rows="2"></textarea></div>
      <div class="form-group full"><label>其他备注</label><textarea id="f_其他备注" rows="2"></textarea></div>
      <div class="form-group full"><label>照片链接（photo_url）</label><input type="text" id="f_photo_url" placeholder="照片网络地址，暂时可留空" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCatModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCat()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // ✏️ 修改管理员密码：改这里
  // ============================================================
  const ADMIN_PASSWORD = "pawalliance2026";
  const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

  function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}
  function esc(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function timeAgo(d){if(!d)return"";const s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return"刚刚";if(s<3600)return Math.floor(s/60)+"分钟前";if(s<86400)return Math.floor(s/3600)+"小时前";return d.slice(0,10);}

  // ── 登录 ──
  function login(){
    const pwd=document.getElementById("passwordInput").value;
    if(pwd===ADMIN_PASSWORD){
      sessionStorage.setItem("paw_admin","1");
      document.getElementById("loginPage").style.display="none";
      document.getElementById("adminPage").style.display="block";
      loadCats();
    } else {
      document.getElementById("loginError").style.display="block";
    }
  }
  function logout(){sessionStorage.removeItem("paw_admin");location.reload();}
  if(sessionStorage.getItem("paw_admin")==="1"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("adminPage").style.display="block";
  }

  // ── Tab ──
  function switchTab(tab,btn){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-cats").style.display=tab==="cats"?"block":"none";
    document.getElementById("tab-messages").style.display=tab==="messages"?"block":"none";
    if(tab==="cats")loadCats();
    if(tab==="messages")loadMessages();
  }

  // ── API ──
  async function apiGet(table,query){
    const res=await fetch(SUPABASE_URL+"/rest/v1/"+table+"?"+query,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
    return res.json();
  }
  async function apiPost(table,body){
    const res=await fetch(SUPABASE_URL+"/rest/v1/"+table,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"return=representation"},
      body:JSON.stringify(body)
    });
    return res.json();
  }
  async function apiPatch(table,id,body){
    const res=await fetch(SUPABASE_URL+"/rest/v1/"+table+"?id=eq."+encodeURIComponent(id),{
      method:"PATCH",
      headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"return=minimal"},
      body:JSON.stringify(body)
    });
    return res.ok;
  }
  async function apiDelete(table,id){
    const res=await fetch(SUPABASE_URL+"/rest/v1/"+table+"?id=eq."+encodeURIComponent(id),{
      method:"DELETE",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
    return res.ok;
  }

  // ── 猫咪管理 ──
  async function loadCats(){
    const el=document.getElementById("catsList");
    el.innerHTML='<p class="loading">加载中…</p>';
    const cats=await apiGet("cats","select=*&order=created_at.desc");
    document.getElementById("catsCount").textContent="共 "+cats.length+" 只猫咪";
    if(!cats.length){el.innerHTML='<p class="empty-tip">还没有猫咪档案</p>';return;}
    el.innerHTML='<table class="data-table"><thead><tr>'+
      '<th>档案编号</th><th>昵称</th><th>物种</th><th>性别</th><th>状态</th><th>毛色</th><th>健康</th><th>操作</th>'+
      '</tr></thead><tbody>'+
      cats.map(function(cat){
        return'<tr>'+
          '<td>'+(cat.档案编号||"-")+'</td>'+
          '<td><strong>'+(cat.昵称||"-")+'</strong></td>'+
          '<td>'+(cat.物种||"-")+'</td>'+
          '<td>'+(cat.性别||"-")+'</td>'+
          '<td><span class="status-badge s-'+cat.status+'">'+(cat.status||"-")+'</span></td>'+
          '<td>'+(cat.毛色||"-")+'</td>'+
          '<td>'+(cat.健康状况总结||"-")+'</td>'+
          '<td><div class="action-btns">'+
          '<button class="btn-edit" onclick=\'editCat('+JSON.stringify(cat)+')\'>编辑</button>'+
          '<button class="btn-del" onclick="deleteCat(\''+cat.id+'\',\''+esc(cat.昵称||"")+'\')" >删除</button>'+
          '</div></td></tr>';
      }).join("")+
      '</tbody></table>';
  }

  function openCatModal(cat){
    document.getElementById("modalTitle").textContent=cat?"编辑猫咪档案":"新增猫咪";
    document.getElementById("editCatId").value=cat?cat.id:"";
    ["档案编号","昵称","物种","性别","年龄","毛色","体型","status","发现时间","发现地点","性格","特殊习性","健康状况总结","绝育信息","疫苗记录","驱虫记录","伤病记录","救助过程记录","领养信息","其他备注","photo_url"].forEach(function(f){
      const el=document.getElementById("f_"+f);
      if(el)el.value=cat?(cat[f]||""):"";
    });
    document.getElementById("catModal").classList.add("open");
  }
  function editCat(cat){openCatModal(cat);}
  function closeCatModal(){document.getElementById("catModal").classList.remove("open");}

  async function saveCat(){
    const id=document.getElementById("editCatId").value;
    const data={};
    ["档案编号","昵称","物种","性别","年龄","毛色","体型","status","发现时间","发现地点","性格","特殊习性","健康状况总结","绝育信息","疫苗记录","驱虫记录","伤病记录","救助过程记录","领养信息","其他备注","photo_url"].forEach(function(f){
      const el=document.getElementById("f_"+f);
      if(el)data[f]=el.value;
    });
    if(!data["昵称"]){showToast("昵称不能为空");return;}
    if(id){await apiPatch("cats",id,data);}
    else{await apiPost("cats",data);}
    closeCatModal();
    await loadCats();
    showToast(id?"修改成功 ✓":"新增成功 ✓");
  }

  async function deleteCat(id,name){
    if(!confirm("确定要删除「"+name+"」的档案吗？此操作不可恢复。"))return;
    const ok=await apiDelete("cats",id);
    if(ok){await loadCats();showToast("已删除「"+name+"」");}
    else showToast("删除失败，请重试");
  }

  // ── 留言管理 ──
  async function loadMessages(){
    const el=document.getElementById("msgList");
    el.innerHTML='<p class="loading">加载中…</p>';
    const[messages,replies]=await Promise.all([
      apiGet("messages","select=*&order=created_at.desc"),
      apiGet("replies","select=*&order=created_at.asc")
    ]);
    document.getElementById("msgCount").textContent="共 "+messages.length+" 条留言";
    if(!messages.length){el.innerHTML='<p class="empty-tip">还没有留言</p>';return;}

    el.innerHTML=messages.map(function(msg){
      const msgReplies=replies.filter(r=>r.message_id===msg.id);
      const replyCount=msgReplies.length;

      // 渲染回复列表
      const repliesHtml=replyCount?
        '<div class="replies-section">'+
          '<div class="replies-section-title">用户回复（'+replyCount+'条）</div>'+
          msgReplies.map(function(r){
            return'<div class="reply-manage-item" id="radmin_'+r.id+'">'+
              '<div class="reply-manage-content">'+
              '<span class="reply-manage-name">'+esc(r.name)+(r.is_admin?' 🐾':'')+'</span>'+
              (r.parent_reply_id?'<span style="font-size:11px;color:var(--text-hint);margin-left:6px">（二级回复）</span>':'')+
              '<div class="reply-manage-text">'+esc(r.content)+'</div>'+
              '<div class="reply-manage-meta">'+timeAgo(r.created_at)+' · 👍 '+(r.likes||0)+'</div>'+
              '</div>'+
              '<button class="btn-del" onclick="deleteReply(\''+r.id+'\')">删除</button>'+
              '</div>';
          }).join("")+
        '</div>':'';

      return'<div class="msg-card" id="madmin_'+msg.id+'">'+
        '<div class="msg-card-header">'+
        '<div><span class="msg-author">'+esc(msg.name)+'</span><span class="msg-time">'+timeAgo(msg.created_at)+'</span></div>'+
        '<button class="btn-del" onclick="deleteMessage(\''+msg.id+'\')">删除留言</button>'+
        '</div>'+
        '<div class="msg-content">'+esc(msg.content)+'</div>'+
        '<div class="msg-likes">👍 '+(msg.likes||0)+' 个赞</div>'+
        (msg.reply?'<div class="existing-reply"><div class="existing-reply-label">🐾 已回复</div><div class="existing-reply-content">'+esc(msg.reply)+'</div></div>':'')+
        '<div class="reply-area">'+
        '<input type="text" id="replyInput_'+msg.id+'" placeholder="输入官方回复内容…" value="'+(msg.reply?esc(msg.reply):'')+'" />'+
        '<button class="btn-edit" onclick="replyMessage(\''+msg.id+'\')">回复</button>'+
        '</div>'+
        repliesHtml+
        '</div>';
    }).join("");
  }

  async function replyMessage(id){
    const reply=document.getElementById("replyInput_"+id).value.trim();
    if(!reply){showToast("请输入回复内容");return;}
    const ok=await apiPatch("messages",id,{reply:reply});
    if(ok){await loadMessages();showToast("回复成功 ✓");}
    else showToast("回复失败，请重试");
  }

  async function deleteMessage(id){
    if(!confirm("确定删除这条留言吗？相关回复也会一并删除。"))return;
    // 先删除该留言下所有回复
    await fetch(SUPABASE_URL+"/rest/v1/replies?message_id=eq."+encodeURIComponent(id),{
      method:"DELETE",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
    const ok=await apiDelete("messages",id);
    if(ok){await loadMessages();showToast("留言已删除");}
    else showToast("删除失败，请重试");
  }

  async function deleteReply(id){
    if(!confirm("确定删除这条回复吗？"))return;
    // 同时删除该回复下的子回复
    await fetch(SUPABASE_URL+"/rest/v1/replies?parent_reply_id=eq."+encodeURIComponent(id),{
      method:"DELETE",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
    const ok=await apiDelete("replies",id);
    if(ok){await loadMessages();showToast("回复已删除");}
    else showToast("删除失败，请重试");
  }

  // 初始化
  if(sessionStorage.getItem("paw_admin")==="1")loadCats();
</script>
</body>
</html>
