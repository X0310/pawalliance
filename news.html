<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态公告 · PawAlliance</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .news-filter { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:2rem; }
    .filter-btn { padding:6px 16px; border-radius:20px; font-size:13px; border:1px solid var(--cream-border); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .2s; }
    .filter-btn.active, .filter-btn:hover { background:var(--brown-light); color:var(--brown-deep); border-color:var(--brown-light); }
    .news-item { background:var(--white); border-radius:var(--radius-md); border:1px solid var(--cream-border); padding:1.5rem; margin-bottom:1.2rem; transition:box-shadow .2s; cursor:pointer; }
    .news-item:hover { box-shadow:var(--shadow-card); }
    .news-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .news-type { padding:3px 10px; border-radius:8px; font-size:12px; }
    .type-救助 { background:#FAE0D8; color:#9A3820; }
    .type-医疗 { background:#F5E0A0; color:#7A5010; }
    .type-送养 { background:#D4E8C2; color:#3A6020; }
    .type-云养 { background:#C8E8E0; color:#1A6050; }
    .type-活动 { background:#E0D8F5; color:#4A3090; }
    .type-公告 { background:var(--cream-dark); color:var(--text-muted); }
    .news-date { font-size:13px; color:var(--text-hint); }
    .news-title { font-size:16px; font-weight:500; color:var(--brown-dark); margin-bottom:8px; }
    .news-summary { font-size:14px; color:var(--text-muted); line-height:1.8; }
    .news-read-more { font-size:13px; color:var(--brown-mid); margin-top:10px; display:inline-block; }

    /* 详情弹窗 */
    .modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(50,30,10,.45); align-items:flex-start; justify-content:center; padding:2rem; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--white); border-radius:var(--radius-xl); padding:2.5rem; width:100%; max-width:680px; margin:auto; box-shadow:var(--shadow-soft); }
    .modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-hint); margin-top:-8px; }
    .modal-news-title { font-family:"PingFang SC","Microsoft YaHei",Georgia,serif; font-size:1.5rem; font-weight:500; color:var(--brown-deep); margin:1rem 0 .5rem; line-height:1.4; }
    .modal-news-meta { display:flex; gap:10px; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--cream-border); }
    .modal-news-content { font-size:15px; color:var(--text-muted); line-height:2; }
    .modal-news-content p { margin-bottom:1rem; }

    .skeleton { animation:shimmer 1.5s infinite; }
    .skeleton-item { background:var(--cream-dark); border-radius:var(--radius-md); height:110px; margin-bottom:1.2rem; }
    @keyframes shimmer { 0%{opacity:.6}50%{opacity:1}100%{opacity:.6} }
    .empty-tip { color:var(--text-hint); font-size:14px; text-align:center; padding:3rem 0; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-fallback" style="display:flex">🐾</div>
        <span class="logo-text">PawAlliance</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">首页</a>
        <a href="cats.html" class="nav-link">我们的猫</a>
        <a href="adopt.html" class="nav-link">云养计划</a>
        <a href="news.html" class="nav-link active">动态公告</a>
        <a href="message.html" class="nav-link">留言板</a>
        <a href="about.html" class="nav-link">关于我们</a>
      </div>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-header">
    <h1>动态公告</h1>
    <p>记录每一个重要时刻</p>
  </div>

  <section class="section" style="padding-top:1rem">
    <div class="container" style="max-width:760px">
      <div class="news-filter" id="newsFilter">
        <button class="filter-btn active" onclick="filterNews('all',this)">全部</button>
        <button class="filter-btn" onclick="filterNews('救助',this)">救助</button>
        <button class="filter-btn" onclick="filterNews('医疗',this)">医疗</button>
        <button class="filter-btn" onclick="filterNews('送养',this)">送养</button>
        <button class="filter-btn" onclick="filterNews('云养',this)">云养</button>
        <button class="filter-btn" onclick="filterNews('活动',this)">活动</button>
        <button class="filter-btn" onclick="filterNews('公告',this)">公告</button>
      </div>
      <div id="newsList">
        <div class="skeleton">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="logo-text">PawAlliance</span>
      <p class="footer-copy">© 2026 PawAlliance · 以商养善，让爱延续</p>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    const SUPABASE_URL = "https://ecvwyfolfitogyeiywbe.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdnd5Zm9sZml0b2d5ZWl5d2JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDM3NjEsImV4cCI6MjA5MDk3OTc2MX0.zIhjbFHEw3cGKkPYZjAA4vi6X-D7N9xVI_rcx8hrzEs";

    function esc(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
    function timeAgo(d){if(!d)return"";const s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return"刚刚";if(s<3600)return Math.floor(s/60)+"分钟前";if(s<86400)return Math.floor(s/3600)+"小时前";if(s<2592000)return Math.floor(s/86400)+"天前";return d.slice(0,10);}

    let allNews = [];

    async function loadNews(){
      const el = document.getElementById("newsList");
      try {
        const res = await fetch(SUPABASE_URL+"/rest/v1/news?select=*&published=eq.true&order=created_at.desc",{
          headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
        });
        allNews = await res.json();
        renderNews(allNews);
      } catch(e) {
        el.innerHTML='<p class="empty-tip">加载失败，请刷新重试 😿</p>';
      }
    }

    function renderNews(list){
      const el = document.getElementById("newsList");
      if(!list||!list.length){el.innerHTML='<p class="empty-tip">暂无动态，敬请期待～</p>';return;}
      el.innerHTML = list.map(function(n){
        return'<div class="news-item" onclick="openNews(\''+n.id+'\')">'+
          '<div class="news-meta">'+
          '<span class="news-type type-'+n.type+'">'+esc(n.type)+'</span>'+
          '<span class="news-date">'+timeAgo(n.created_at)+'</span>'+
          '</div>'+
          '<div class="news-title">'+esc(n.title)+'</div>'+
          '<div class="news-summary">'+esc(n.summary||"")+'</div>'+
          '<span class="news-read-more">阅读全文 →</span>'+
          '</div>';
      }).join("");
    }

    function filterNews(type, btn){
      document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      if(type==="all") renderNews(allNews);
      else renderNews(allNews.filter(n=>n.type===type));
    }

    function openNews(id){
      const n = allNews.find(n=>n.id===id);
      if(!n) return;
      document.getElementById("modalContent").innerHTML=
        '<div class="news-meta">'+
        '<span class="news-type type-'+n.type+'">'+esc(n.type)+'</span>'+
        '<span class="news-date">'+timeAgo(n.created_at)+'</span>'+
        '</div>'+
        '<div class="modal-news-title">'+esc(n.title)+'</div>'+
        '<div class="modal-news-meta"></div>'+
        '<div class="modal-news-content">'+(n.content||esc(n.summary||"暂无详细内容"))+'</div>';
      document.getElementById("newsModal").classList.add("open");
    }

    function closeModal(){document.getElementById("newsModal").classList.remove("open");}
    document.getElementById("newsModal").addEventListener("click",function(e){if(e.target===this)closeModal();});

    loadNews();
  </script>
</body>
</html>
